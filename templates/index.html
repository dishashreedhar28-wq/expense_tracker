<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container py-5">

    <div class="main-card">

        <h1 class="text-center mb-4">💰 Expense Tracker</h1>

        <form method="POST" class="row g-3">

            <div class="col-md-4">
                <input type="text" name="title" class="form-control" placeholder="Expense Title" required>
            </div>

            <div class="col-md-3">
                <select name="category" class="form-select" required>
                    <option value="Food">Food</option>
                    <option value="Travel">Travel</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="col-md-3">
                <input type="number" name="amount" class="form-control" placeholder="Amount" required>
            </div>

            <div class="col-md-2 d-grid">
                <button class="btn btn-primary">Add</button>
            </div>

        </form>

        <hr>

        <form method="GET" class="mb-4">
            <label class="mb-2">Filter by Month</label>
            <input type="month" name="month" class="form-control" value="{{ selected_month }}">
            <button class="btn btn-dark mt-2">Filter</button>
        </form>

        <div class="summary-box">
            <h3>Total Spending: ₹{{ total }}</h3>
        </div>

        <div class="chart-box mt-4">
            <canvas id="expenseChart"></canvas>
        </div>

        <table class="table table-hover table-striped mt-4">
            <thead class="table-dark">
                <tr>
                    <th>Date</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Amount</th>
                </tr>
            </thead>

            <tbody>
                {% for expense in expenses %}
                <tr>
                    <td>{{ expense.Date }}</td>
                    <td>{{ expense.Title }}</td>
                    <td>{{ expense.Category }}</td>
                    <td>₹{{ expense.Amount }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>

<script>

const ctx = document.getElementById('expenseChart');

new Chart(ctx, {
    type: 'pie',
    data: {
        labels: {{ category_totals.keys() | list | tojson }},
        datasets: [{
            label: 'Expenses',
            data: {{ category_totals.values() | list | tojson }},
            borderWidth: 1
        }]
    }
});

</script>

</body>
</html>
